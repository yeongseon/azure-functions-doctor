site_name: Azure Functions Doctor
site_description: A diagnostic tool for Python Azure Functions
site_author: Yeongseon Choe
repo_url: https://github.com/yeongseon/azure-functions-doctor
site_url: https://yeongseon.github.io/azure-functions-doctor/

theme:
  name: material
  logo: logo_assets/logo.png
  favicon: logo_assets/logo_favicon_16px.png

nav:
  - Home: index.md
  - CLI Usage: usage.md
  - Diagnostics: diagnostics.md
  - Rules: rules.md
  - Rule Inventory: rule_inventory.md
  - Minimal Profile: minimal_profile.md
  - JSON Output Contract: json_output_contract.md
  - Semver Policy: semver_policy.md
  - Supported Versions: supported_versions.md
  - Handlers: handlers.md
  - Development: development.md
  - Testing: testing.md
  - Troubleshooting: troubleshooting.md
  - API Reference: api.md
  - Release Process: release_process.md
  - Security: security.md
  - Changelog: changelog.md
  - Contributing: contributing.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_signature: true
            show_root_full_path: false
            merge_init_into_class: true

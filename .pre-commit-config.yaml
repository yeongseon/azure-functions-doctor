repos:
  # Format code using Black (PEP8-compliant, compatible with Python 3.10)
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black

  # Lint and auto-fix style using Ruff (Python 3.10 compatible)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff
        args: ["--fix"]
        exclude: "^tests/"

  # Static type checking using mypy (ensure Python 3.10 environment is activated)
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        language: python
        files: "^(src|tests)/"
        args:
          [
            "--config-file=pyproject.toml",
            "--install-types",
            "--non-interactive",
          ]
        additional_dependencies:
          - types-requests
          - typer
          - requests

  # Run static security checks using Bandit (scan src/ only)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: "^src/"
